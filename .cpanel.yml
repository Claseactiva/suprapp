---
# Fase 2 de produccion para SupraApp: frontend, rutas y docs de apoyo.
deployment:
  tasks:
    - export DEPLOYPATH=/home/supra/suprapp.comercialsupra.cl/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R public $DEPLOYPATH
    - /bin/cp -R resources $DEPLOYPATH
    - /bin/cp -R routes $DEPLOYPATH
    - /bin/cp -R services $DEPLOYPATH
    - /bin/cp -f package.json $DEPLOYPATH
    - /bin/cp -f package-lock.json $DEPLOYPATH
    - /bin/cp -f phpunit.xml $DEPLOYPATH
    - /bin/cp -f webpack.mix.js $DEPLOYPATH
    - /bin/cp -f MD_MAESTRO_SUPRAPP.md $DEPLOYPATH
    - /bin/cp -f MAPA_TECNICO_SUPRAPP.md $DEPLOYPATH
    - /bin/cp -f PROTOCOLO_DESPLIEGUE_SUPRAPP.md $DEPLOYPATH
