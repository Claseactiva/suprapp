---
# Diagnostico puntual: copiar solo resources/ y guardar salida, error y exit code
deployment:
  tasks:
    - export DEPLOYPATH=/home/supra/suprapp_deploy_test/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/rm -rf $DEPLOYPATH/resources
    - /bin/rm -f $DEPLOYPATH/cp_resources.out $DEPLOYPATH/cp_resources.err $DEPLOYPATH/cp_resources.exit
    - /bin/sh -c '/bin/cp -R resources "$DEPLOYPATH" >"$DEPLOYPATH/cp_resources.out" 2>"$DEPLOYPATH/cp_resources.err"; echo $? >"$DEPLOYPATH/cp_resources.exit"'
