---
# Despliegue acotado para el catalogo generico de sugerencias de productos.
deployment:
  tasks:
    - export DEPLOYPATH=/home/supra/suprapp.comercialsupra.cl/
    - /bin/mkdir -p $DEPLOYPATH/app/Console/Commands
    - /bin/mkdir -p $DEPLOYPATH/app/Http/Controllers
    - /bin/mkdir -p $DEPLOYPATH/app/Models
    - /bin/mkdir -p $DEPLOYPATH/database/migrations
    - /bin/mkdir -p $DEPLOYPATH/public/js
    - /bin/mkdir -p $DEPLOYPATH/resources/assets/js/components/Quotationclient
    - /bin/mkdir -p $DEPLOYPATH/resources/assets/js/components/store
    - /bin/mkdir -p $DEPLOYPATH/routes
    - /bin/cp -f artisan $DEPLOYPATH
    - /bin/cp -f routes/web.php $DEPLOYPATH/routes/web.php
    - /bin/cp -f app/Console/Commands/ImportProductCatalogTemplates.php $DEPLOYPATH/app/Console/Commands/ImportProductCatalogTemplates.php
    - /bin/cp -f app/Http/Controllers/ProductCatalogTemplateController.php $DEPLOYPATH/app/Http/Controllers/ProductCatalogTemplateController.php
    - /bin/cp -f app/Models/ProductCatalogTemplate.php $DEPLOYPATH/app/Models/ProductCatalogTemplate.php
    - /bin/cp -f database/migrations/2026_06_19_000007_create_product_catalog_templates_table.php $DEPLOYPATH/database/migrations/2026_06_19_000007_create_product_catalog_templates_table.php
    - /bin/cp -f product_catalog_templates.csv $DEPLOYPATH/product_catalog_templates.csv
    - /bin/cp -f public/js/app.js $DEPLOYPATH/public/js/app.js
    - /bin/cp -f resources/assets/js/components/Quotationclient/Detalle.vue $DEPLOYPATH/resources/assets/js/components/Quotationclient/Detalle.vue
    - /bin/cp -f resources/assets/js/components/Quotationclient/DetalleMechanic.vue $DEPLOYPATH/resources/assets/js/components/Quotationclient/DetalleMechanic.vue
    - /bin/cp -f resources/assets/js/components/Quotationclient/productSuggestionHelpers.js $DEPLOYPATH/resources/assets/js/components/Quotationclient/productSuggestionHelpers.js
    - /bin/cp -f resources/assets/js/components/store/actions.js $DEPLOYPATH/resources/assets/js/components/store/actions.js
    - /bin/cp -f resources/assets/js/components/store/mutations.js $DEPLOYPATH/resources/assets/js/components/store/mutations.js
    - /bin/cp -f resources/assets/js/components/store/state.js $DEPLOYPATH/resources/assets/js/components/store/state.js
    - cd $DEPLOYPATH && php artisan migrate --force
    - cd $DEPLOYPATH && php artisan suprapp:import-product-catalog product_catalog_templates.csv --fresh
