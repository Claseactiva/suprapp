    - /bin/cp -f product_catalog_templates.csv $DEPLOYPATH/product_catalog_templates.csv
    - /bin/cp -f public/js/app.js $DEPLOYPATH/public/js/app.js
    - /bin/cp -f public/js/app-principal.js $DEPLOYPATH/public/js/app-principal.js
    - /bin/cp -f public/css/app-principal.css $DEPLOYPATH/public/css/app-principal.css
    - /bin/cp -f resources/assets/js/components/Product/Index.vue $DEPLOYPATH/resources/assets/js/components/Product/Index.vue
