---
# Diagnostico puntual: copiar solo app/ y guardar salida, error y exit code
deployment:
  tasks:
    - export DEPLOYPATH=/home/supra/suprapp_deploy_test/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/rm -f $DEPLOYPATH/cp_app.out $DEPLOYPATH/cp_app.err $DEPLOYPATH/cp_app.exit
    - /bin/sh -c '/bin/cp -R app "$DEPLOYPATH" >"$DEPLOYPATH/cp_app.out" 2>"$DEPLOYPATH/cp_app.err"; echo $? >"$DEPLOYPATH/cp_app.exit"'
