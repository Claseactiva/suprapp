---
# Prueba de deploy con rsync para evitar el cuelgue observado con cp -R
deployment:
  tasks:
    - export SRCPATH=/home/supra/suprapp_repo/
    - export DEPLOYPATH=/home/supra/suprapp_deploy_test/
    - /bin/mkdir -p $DEPLOYPATH
    - /usr/bin/rsync -av --delete --exclude='.git' --exclude='.env' --exclude='vendor' --exclude='node_modules' --exclude='supra_suprapp_2024.sql' --exclude='storage/app/public/images' $SRCPATH $DEPLOYPATH
