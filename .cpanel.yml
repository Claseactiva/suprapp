---
# Repo clonado en cPanel aparte; el deploy copia hacia la carpeta live de SupraApp
deployment:
  tasks:
    - export DEPLOYPATH=/home/supra/suprapp.comercialsupra.cl/
    - /bin/cp -rp . $DEPLOYPATH
    - rm -rf $DEPLOYPATH/.git
    - find $DEPLOYPATH -type d -exec chmod 755 {} +
    - find $DEPLOYPATH -type f -exec chmod 644 {} +
