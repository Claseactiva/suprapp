---
# Fase 1 de deploy para SupraApp: backend y raiz minima.
deployment:
  tasks:
    - export DEPLOYPATH=/home/supra/suprapp_deploy_test/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R app $DEPLOYPATH
    - /bin/cp -R bootstrap $DEPLOYPATH
    - /bin/cp -R config $DEPLOYPATH
    - /bin/cp -R database $DEPLOYPATH
    - /bin/cp -f .htaccess $DEPLOYPATH
    - /bin/cp -f .user.ini $DEPLOYPATH
    - /bin/cp -f artisan $DEPLOYPATH
    - /bin/cp -f composer.json $DEPLOYPATH
    - /bin/cp -f composer.lock $DEPLOYPATH
    - /bin/cp -f php.ini $DEPLOYPATH
    - /bin/cp -f server.php $DEPLOYPATH
    - /bin/cp -f README.md $DEPLOYPATH
