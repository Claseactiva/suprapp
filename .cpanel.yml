---
# Deploy temporal de prueba para validar Git Version Control sin tocar produccion
deployment:
  tasks:
    - export DEPLOYPATH=/home/supra/suprapp_deploy_test/
    - /bin/cp -rp . $DEPLOYPATH
    - rm -rf $DEPLOYPATH/.git
    - find $DEPLOYPATH -type d -exec chmod 755 {} +
    - find $DEPLOYPATH -type f -exec chmod 644 {} +
